name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP lint and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPCS
        run: composer run lint:php

      - name: Run PHPUnit
        run: composer run test

  terraform:
    name: Terraform format and validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform/environments/staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive ../..

      - name: Initialize Terraform (no backend)
        run: terraform init -backend=false

      - name: Validate Terraform
        run: terraform validate

  shell:
    name: Shell script lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck -S error scripts/*.sh

  docker:
    name: Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Compose requires MYSQL_* and CIVICRM_ADMIN_PASS; .env is gitignored.
      - name: Prepare Compose environment
        run: cp .env.example .env

      - name: Validate local Compose stack
        run: |
          docker compose --project-directory . \
            -f docker/docker-compose.yml \
            -f docker/docker-compose.local.yml \
            config --quiet

      - name: Validate staging Compose stack
        run: |
          docker compose --project-directory . \
            -f docker/docker-compose.yml \
            -f docker/docker-compose.staging.yml \
            config --quiet
